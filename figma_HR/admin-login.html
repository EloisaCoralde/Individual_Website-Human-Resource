<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeopleHub | Admin Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="Coralde.html">
        <img src="logo.png" width="55" height="55" class="rounded-circle bg-white me-2">
        PeopleHub
    </a>
  </div>
</nav>

<!-- ==========================================
     ADMIN LOGIN SECTION
     Re-uses the same .login-section / .login-card
     styling as the employee login page.
========================================== -->

<section class="login-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card login-card border-0">
          <div class="card-body p-5">

            <div class="text-center mb-4">
              <i class="fas fa-user-shield fa-3x text-primary mb-3"></i>
              <h2 class="fw-bold">Admin Login</h2>
              <p class="text-muted">Sign in to manage PeopleHub</p>
            </div>

            <!-- Login Error -->
            <div id="adminLoginError" class="alert alert-danger py-2 px-3 small mb-3" style="display:none;"></div>

            <form id="adminLoginForm">

              <div class="mb-3">
                <label class="form-label">Admin Email</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                  <input type="email" class="form-control" id="adminEmail" placeholder="Enter admin email" required>
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-lock"></i></span>
                  <input type="password" class="form-control" id="adminPassword" placeholder="Enter password" required>
                </div>
              </div>

              <div class="d-grid">
                <button class="btn btn-primary btn-lg">Login as Admin</button>
              </div>

              <div class="text-center mt-4">
                Not an admin? <a href="login.html">Employee Login</a>
              </div>

            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ==========================================
     ADMIN LOGIN HANDLER
     Talks to api/admin_login.php, which checks the
     "admins" MySQL table (separate from employee accounts).
========================================== -->
<script>

document.getElementById("adminLoginForm").addEventListener("submit", async function (e) {

    e.preventDefault();

    const email = document.getElementById("adminEmail").value;
    const password = document.getElementById("adminPassword").value;

    const submitBtn = e.target.querySelector("button.btn-primary");
    submitBtn.disabled = true;
    submitBtn.textContent = "Logging in...";

    const errorBox = document.getElementById("adminLoginError");
    errorBox.style.display = "none";

    try {
        const res = await fetch("api/admin_login.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ email, password })
        });

        const result = await res.json();

        if (result.success) {
            window.location.href = "admin.html";
        } else {
            errorBox.textContent = result.message || "Login failed. Please try again.";
            errorBox.style.display = "block";
            submitBtn.disabled = false;
            submitBtn.textContent = "Login as Admin";
        }
    } catch (err) {
        errorBox.textContent = "Could not reach the server. Please try again.";
        errorBox.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "Login as Admin";
    }

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
